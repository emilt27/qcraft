[workspace]
resolver = "3"
members = [
    "crates/qcraft",
    "crates/qcraft-core",
    "crates/qcraft-postgres",
    "crates/qcraft-sqlite",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
qcraft-core = { path = "crates/qcraft-core" }
qcraft-postgres = { path = "crates/qcraft-postgres" }
qcraft-sqlite = { path = "crates/qcraft-sqlite" }
thiserror = "2"
